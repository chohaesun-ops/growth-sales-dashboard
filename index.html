<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDSL · 매출 KPI 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEF2F7; --s1:#FFFFFF; --s2:#F4F7FB; --bd:#D8E2EF; --bd2:#C2D0E2;
  --ink:#1C3557; --ink2:#4A6A88; --ink3:#8BA8C2;
  --mono:'DM Mono',monospace;
  --blue:#4D9EFF; --blue-bg:rgba(77,158,255,.12);
  --pos:#34C78A; --pos-bg:rgba(52,199,138,.14);
  --neg:#FF5B5B; --neg-bg:rgba(255,91,91,.12);
  --warn:#F59E0B; --warn-bg:rgba(245,158,11,.14);
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── HEADER ─────────────────────────────────────────────── */
.hdr{background:#1C3557;border-bottom:1px solid #243D57;padding:0 28px;height:54px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:800;letter-spacing:-.01em;color:#fff}
.logo em{color:var(--ink3);font-weight:400;font-style:normal;font-size:13px;margin-left:8px}
.hdr-r{font-size:11.5px;color:#8BA8C2;display:flex;align-items:center;gap:12px}
.live{width:7px;height:7px;border-radius:50%;background:var(--pos);animation:lp 2.4s ease infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(52,199,138,.4)}60%{box-shadow:0 0 0 5px transparent}}

/* ── MAIN PAGE ───────────────────────────────────────────── */
.page{max-width:1360px;margin:0 auto;padding:22px 28px 48px}

/* 월 선택 */
.mo-bar{display:flex;align-items:center;gap:3px;background:var(--s1);border:1px solid var(--bd);box-shadow:0 1px 4px rgba(28,53,87,.06);
  border-radius:8px;padding:4px;margin-bottom:22px;flex-wrap:wrap}
.mo-btn{flex:1;min-width:50px;padding:7px 2px;text-align:center;font-size:11px;font-weight:600;
  color:var(--ink3);background:none;border:none;cursor:pointer;border-radius:5px;
  transition:all .14s;font-family:'Pretendard',sans-serif}
.mo-btn:hover:not(.on){background:var(--s2);color:var(--ink2)}
.mo-btn.on{background:var(--blue);color:#fff}
.mo-btn.real{color:var(--ink2)}
.mo-ytd{padding:7px 18px;font-size:11.5px;font-weight:700;color:var(--blue);
  background:var(--blue-bg);border:1px solid rgba(77,158,255,.3);
  border-radius:5px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .14s;white-space:nowrap}
.mo-ytd.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* 배너 */
.banner{background:linear-gradient(135deg,#1C3557 0%,#2E5F8A 100%);
  border:none;border-radius:12px;
  padding:22px 26px;margin-bottom:20px;
  display:grid;grid-template-columns:1.8fr 1px repeat(4,1fr);gap:0;align-items:center;
  box-shadow:0 6px 24px rgba(28,53,87,.22)}
.ban-div{width:1px;background:rgba(255,255,255,.2);height:52px;margin:0 4px}
.ban-main{padding-right:24px}
.ban-period{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.6);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ban-period .dot{width:7px;height:7px;border-radius:50%;background:#4D9EFF}
.ban-val{font-family:var(--mono);font-size:30px;font-weight:500;line-height:1;margin-bottom:7px;color:#fff}
.ban-sub{font-size:12px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:8px}
.ach-badge{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;font-family:var(--mono)}
.ban-kpi{padding:0 18px;display:flex;flex-direction:column;gap:4px}
.bk-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:5px}
.bk-label .dot{width:6px;height:6px;border-radius:50%}
.bk-val{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1;color:#fff}
.bk-ach{font-family:var(--mono);font-size:11px;font-weight:700;margin-top:2px}

/* 채널 카드 */
.ch-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:20px}
.ch-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;
  cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;animation:fu .35s ease both;position:relative;
  box-shadow:0 2px 8px rgba(28,53,87,.07)}
.ch-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(28,53,87,.13)}
.ch-card .expand-hint{position:absolute;bottom:12px;right:12px;font-size:9px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);opacity:0;transition:opacity .15s;
  display:flex;align-items:center;gap:4px}
.ch-card:hover .expand-hint{opacity:1}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cc-head{padding:14px 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.cc-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.cc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cc-ach{font-family:var(--mono);font-size:17px;font-weight:700}
.ring-area{position:relative;display:flex;justify-content:center;align-items:center;padding:16px 0 10px}
.ring-canvas{display:block}
.ring-mid{position:absolute;text-align:center;pointer-events:none}
.ring-pct{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1}
.ring-lbl{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-top:3px}
.pbar-wrap{padding:0 16px 12px}
.pbar-bg{height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.pbar-labels{display:flex;justify-content:space-between;margin-top:5px}
.pl-ach{font-family:var(--mono);font-size:10px;font-weight:700}
.pl-tgt{font-size:9.5px;color:var(--ink3);font-family:var(--mono)}
.divider{height:1px;background:var(--bd);margin:0 16px}
.cc-nums{padding:10px 16px 22px;display:flex;flex-direction:column;gap:7px}
.num-row{display:flex;justify-content:space-between}
.nr-label{font-size:10px;color:var(--ink3)}
.nr-val{font-family:var(--mono);font-size:12px;font-weight:600}
.nr-tgt{font-family:var(--mono);font-size:10px;color:var(--ink3)}

/* 하단 차트 */
.chart-grid{display:grid;grid-template-columns:2.2fr 1fr 1fr;gap:13px;margin-bottom:13px}
.chart-grid2{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.cpanel{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px rgba(28,53,87,.06)}
.cp-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.cp-sub{font-size:10px;color:var(--ink3);margin-bottom:14px}

/* ══════════════════════════════════════════════════════════
   전체화면 드릴다운 오버레이
══════════════════════════════════════════════════════════ */
.drill-overlay{
  position:fixed;inset:0;z-index:400;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.drill-overlay.open{opacity:1;pointer-events:all}

/* 뒷배경 블러 */
.drill-backdrop{position:absolute;inset:0;background:rgba(15,28,46,.72);backdrop-filter:blur(4px)}

/* 드릴 컨테이너 */
.drill-container{
  position:relative;z-index:1;
  margin:24px auto;
  width:calc(100vw - 48px);
  max-width:1400px;
  height:calc(100vh - 48px);
  background:var(--s1);
  border:1px solid var(--bd2);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transform:scale(.96) translateY(12px);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.drill-overlay.open .drill-container{transform:scale(1) translateY(0)}

/* 드릴 헤더 */
.drill-hdr{
  padding:0 28px;height:60px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bd);
  background:var(--s2);
}
.drill-hdr-left{display:flex;align-items:center;gap:14px}
.dh-back{width:34px;height:34px;border-radius:7px;border:1px solid var(--bd2);
  background:none;color:var(--ink2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.dh-back:hover{background:var(--bd);color:var(--ink)}
.dh-divider{width:1px;height:24px;background:var(--bd)}
.dh-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dh-title{font-size:18px;font-weight:800;letter-spacing:-.01em}
.dh-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.dh-badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px}

/* 채널 전환 탭 */
.drill-ch-tabs{display:flex;gap:4px}
.dct{padding:6px 14px;font-size:11.5px;font-weight:600;border-radius:6px;
  border:1px solid var(--bd);background:none;color:var(--ink3);cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.dct:hover{background:var(--bd);color:var(--ink2)}
.dct.on{color:#fff;border-color:currentColor}
.dct .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* 드릴 본문 */
.drill-body{flex:1;overflow:hidden;display:grid;grid-template-columns:340px 1fr;gap:0}

/* 왼쪽: 요약 + 거래처 테이블 */
.drill-left{border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.dl-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);flex-shrink:0}
.dlk{background:var(--s1);padding:16px 18px}
.dlk-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.dlk-val{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1;margin-bottom:3px}
.dlk-sub{font-size:10px;color:var(--ink3)}

.dl-scroll{flex:1;overflow-y:auto;padding:20px}
.dl-scroll::-webkit-scrollbar{width:4px}
.dl-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

/* 오른쪽: 차트 영역 */
.drill-right{overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}
.drill-right::-webkit-scrollbar{width:4px}
.drill-right::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

/* 섹션 타이틀 */
.dsec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px}
.dsec-bar{width:3px;height:12px;border-radius:2px;flex-shrink:0}

/* 거래처 테이블 */
.sub-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sub-tbl thead th{padding:8px 10px;font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);text-align:right;border-bottom:1px solid var(--bd);white-space:nowrap}
.sub-tbl thead th:first-child{text-align:left}
.sub-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s}
.sub-tbl tbody tr:hover{background:var(--s2)}
.sub-tbl tbody tr.selected{background:rgba(77,158,255,.1);border-left:2px solid var(--blue)}
.sub-tbl td{padding:11px 10px;text-align:right}
.sub-tbl td:first-child{text-align:left;font-weight:600;color:var(--ink2)}
.sub-tbl td.v-act{font-family:var(--mono);font-weight:700;font-size:12.5px}
.sub-tbl td.v-tgt{font-family:var(--mono);color:var(--ink3)}
.sub-tbl tr.tr-total{border-top:2px solid var(--bd)}
.sub-tbl tr.tr-total td{font-weight:700;color:var(--ink);background:var(--s2);font-size:12.5px}

/* 미니 달성 바 */
.mbar{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.mb-bg{width:52px;height:4px;background:var(--bd2);border-radius:99px;overflow:hidden;flex-shrink:0}
.mb-f{height:100%;border-radius:99px}

/* 차트 카드 */
.drill-chart-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:18px 20px}
.dcc-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.dcc-sub{font-size:10px;color:var(--ink3);margin-bottom:14px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── 파트너 상세 뷰 ────────────────────────────────────── */
.partner-view{display:flex;flex-direction:column;gap:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pv-breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pv-bc-btn{background:none;border:none;color:var(--ink3);cursor:pointer;
  font-size:12px;font-family:'Pretendard',sans-serif;padding:4px 8px;border-radius:5px;transition:all .14s}
.pv-bc-btn:hover{background:var(--bd);color:var(--ink2)}
.pv-bc-sep{color:var(--ink3);font-size:12px}
.pv-bc-cur{font-size:12px;font-weight:700}
.pv-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pvk{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px 16px}
.pvk-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.pvk-v{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1;margin-bottom:2px}
.pvk-s{font-size:10px;color:var(--ink3)}
.pv-broadcast-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.pv-broadcast-tbl thead th{padding:8px 10px;font-size:8px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink3);text-align:right;border-bottom:1px solid var(--bd);white-space:nowrap}
.pv-broadcast-tbl thead th:first-child{text-align:left}
.pv-broadcast-tbl thead th:nth-child(2){text-align:left}
.pv-broadcast-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
.pv-broadcast-tbl tbody tr:hover{background:var(--s2)}
.pv-broadcast-tbl td{padding:10px 10px;text-align:right;font-family:var(--mono);font-size:11px}
.pv-broadcast-tbl td:first-child{font-family:'Pretendard',sans-serif;font-weight:600;color:var(--ink3);text-align:left}
.pv-broadcast-tbl td:nth-child(2){font-family:'Pretendard',sans-serif;text-align:left;color:var(--ink2)}
.pv-broadcast-tbl td.no-data{color:var(--bd2);font-size:10px}
.pv-broadcast-tbl tr.scheduled td{color:var(--ink3)}
.pv-product-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.pvp-row{display:flex;flex-direction:column;gap:4px}
.pvp-head{display:flex;justify-content:space-between;align-items:center}
.pvp-name{font-size:11.5px;font-weight:600;color:var(--ink2)}
.pvp-meta{display:flex;gap:12px}
.pvp-meta span{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.pvp-bar-bg{height:7px;background:var(--bd);border-radius:99px;overflow:hidden}
.pvp-bar-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>

<!-- ── 메인 ──────────────────────────────────────────────── -->
<div class="hdr">
  <div class="logo">MDSL <em>Sales KPI</em></div>
  <div class="hdr-r">
    <div class="live"></div>
    <span id="hdrPeriod">—</span>
    <span style="color:var(--bd2)">|</span>
    <span style="color:var(--ink3)">단위: 억원</span>
  </div>
</div>

<div class="page">
  <div class="mo-bar" id="moBar"></div>
  <div class="banner" id="banner"></div>
  <div class="ch-grid" id="chGrid"></div>
  <div class="chart-grid">
    <div class="cpanel"><div class="cp-title">전사 월별 매출 추이</div><div class="cp-sub">목표 vs 실적 · 꺾은선=달성률</div><canvas id="cTrend" style="max-height:210px"></canvas></div>
    <div class="cpanel"><div class="cp-title">채널 비중</div><div class="cp-sub">실적 기준</div><canvas id="cDonut" style="max-height:210px"></canvas></div>
    <div class="cpanel"><div class="cp-title">채널별 달성률</div><div class="cp-sub">목표 대비 %</div><canvas id="cAch" style="max-height:210px"></canvas></div>
  </div>
  <div class="chart-grid2">
    <div class="cpanel"><div class="cp-title" style="color:#4D9EFF">B2C</div><div class="cp-sub">월별 목표 vs 실적</div><canvas id="cB2C" style="max-height:120px"></canvas></div>
    <div class="cpanel"><div class="cp-title" style="color:#34C78A">B2B</div><div class="cp-sub">월별 목표 vs 실적</div><canvas id="cB2B" style="max-height:120px"></canvas></div>
    <div class="cpanel"><div class="cp-title" style="color:#F59E0B">D2C</div><div class="cp-sub">월별 목표 vs 실적</div><canvas id="cD2C" style="max-height:120px"></canvas></div>
    <div class="cpanel"><div class="cp-title" style="color:#A78BFA">오프라인</div><div class="cp-sub">월별 목표 vs 실적</div><canvas id="cOff" style="max-height:120px"></canvas></div>
    <div class="cpanel"><div class="cp-title" style="color:#F87171">완반</div><div class="cp-sub">월별 목표 vs 실적</div><canvas id="cWb" style="max-height:120px"></canvas></div>
  </div>
</div>

<!-- ══ 전체화면 드릴다운 오버레이 ══════════════════════════ -->
<div class="drill-overlay" id="drillOverlay">
  <div class="drill-backdrop" onclick="closeDrill()"></div>
  <div class="drill-container">

    <!-- 드릴 헤더 -->
    <div class="drill-hdr">
      <div class="drill-hdr-left">
        <button class="dh-back" onclick="closeDrill()" title="닫기">←</button>
        <div class="dh-divider"></div>
        <div class="dh-dot" id="dhDot"></div>
        <div>
          <div class="dh-title" id="dhTitle">—</div>
          <div class="dh-sub" id="dhSub">—</div>
        </div>
        <div class="dh-badge" id="dhBadge"></div>
      </div>
      <!-- 채널 전환 탭 -->
      <div class="drill-ch-tabs" id="drillChTabs"></div>
    </div>

    <!-- 드릴 본문: 왼쪽(요약+테이블) + 오른쪽(차트) -->
    <div class="drill-body">

      <!-- 왼쪽 -->
      <div class="drill-left">
        <div class="dl-kpis" id="dlKpis"></div>
        <div class="dl-scroll">
          <div class="dsec"><span class="dsec-bar" id="dsecBar"></span>거래처별 실적</div>
          <table class="sub-tbl" id="subTbl">
            <thead><tr>
              <th style="text-align:left">거래처</th>
              <th>목표</th><th>실적</th><th>달성률</th><th>비중</th>
            </tr></thead>
            <tbody id="subTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 오른쪽 -->
      <div class="drill-right" id="drillRight"></div>
    </div>

  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────
const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const AM=2;

// ── 상태 & 유틸 ─────────────────────────────────────────────
let curMo='ytd',curDrillCh=null,curPartner=null;

function getPd(k){
  if(curMo==='ytd'){let a=0,t=0,h=false;for(let i=0;i<AM;i++){t+=TGT[k][i];if(ACT[k][i]!==null){a+=ACT[k][i];h=true;}}return{act:h?a:null,tgt:t};}
  return{act:ACT[k][curMo],tgt:TGT[k][curMo]};
}
function getSubPd(s){
  if(curMo==='ytd'){let a=0,t=0,h=false;for(let i=0;i<AM;i++){t+=s.tgt[i];if(s.act[i]!==null){a+=s.act[i];h=true;}}return{act:h?a:null,tgt:t};}
  return{act:s.act[curMo],tgt:s.tgt[curMo]};
}
function pct(a,t){return(a===null||!t)?null:a/t*100}
function ac(p){return p===null?'var(--ink3)':p>=100?'var(--pos)':p>=80?'var(--warn)':'var(--neg)'}
function ab(p){return p===null?'transparent':p>=100?'var(--pos-bg)':p>=80?'var(--warn-bg)':'var(--neg-bg)'}
function fN(v,d=2){return v!==null?v.toFixed(d)+'억':'—'}
function fP(p){return p!==null?p.toFixed(1)+'%':'—'}
const GR={color:'rgba(28,53,87,.06)',borderDash:[3,3]};
const TP={backgroundColor:'#1C3557',titleColor:'#E8F0F8',bodyColor:'#8BA8C2',borderColor:'#243D57',borderWidth:1,padding:12,cornerRadius:6};

// ── 월 선택 ─────────────────────────────────────────────────
function renderMoBar(){
  let h=`<button class="mo-ytd${curMo==='ytd'?' on':''}" onclick="setMo('ytd')">YTD</button>`;
  MO.forEach((m,i)=>h+=`<button class="mo-btn${i===curMo?' on':''}${i<AM?' real':''}" onclick="setMo(${i})">${m}</button>`);
  document.getElementById('moBar').innerHTML=h;
}
function setMo(mo){curMo=mo;renderMoBar();renderAll();if(curDrillCh)openDrill(curDrillCh);}

function renderBanner(){
  const pl=curMo==='ytd'?`YTD 1~${AM}월`:`${MO[curMo]}`;
  document.getElementById('hdrPeriod').textContent=`2026 · ${pl}`;
  const tot=getPd('total'),p=pct(tot.act,tot.tgt);
  const perCh=CHS.map(ch=>{const d=getPd(ch.key),cp=pct(d.act,d.tgt);
    return `<div class="ban-kpi"><div class="bk-label"><span class="dot" style="background:${ch.hex}"></span>${ch.label}</div>
      <div class="bk-val" style="color:${ch.hex}">${fN(d.act)}</div>
      <div style="font-size:10px;color:var(--ink3)">목표 ${fN(d.tgt)}</div>
      <div class="bk-ach" style="color:${ac(cp)}">${fP(cp)}</div></div>`;
  }).join('<div class="ban-div"></div>');
  document.getElementById('banner').innerHTML=`
    <div class="ban-main"><div class="ban-period"><span class="dot"></span>전사 매출 · ${pl}</div>
      <div class="ban-val">${fN(tot.act)}</div>
      <div class="ban-sub">목표 ${fN(tot.tgt)}&nbsp;<span class="ach-badge" style="color:#fff;background:rgba(255,255,255,.18)">${fP(p)}</span></div>
    </div><div class="ban-div"></div>${perCh}`;
}

const ringC={};
function renderCards(){
  const g=document.getElementById('chGrid'); g.innerHTML='';
  CHS.forEach((ch,i)=>{
    const d=getPd(ch.key),p=pct(d.act,d.tgt),fw=p!==null?Math.min(p,100).toFixed(1):0;
    const card=document.createElement('div'); card.className='ch-card'; card.style.animationDelay=`${i*.07}s`;
    card.onclick=()=>openDrill(ch.key);
    card.innerHTML=`
      <div class="expand-hint">🔍 자세히 보기</div>
      <div class="cc-head"><div class="cc-name"><span class="cc-dot" style="background:${ch.hex}"></span>${ch.label}</div>
        <div class="cc-ach" style="color:${ac(p)}">${fP(p)}</div></div>
      <div class="ring-area"><canvas id="ring_${ch.key}" width="90" height="90" class="ring-canvas"></canvas>
        <div class="ring-mid"><div class="ring-pct" style="color:${ac(p)}">${p!==null?Math.round(p)+'%':'—'}</div>
          <div class="ring-lbl">달성률</div></div></div>
      <div class="pbar-wrap"><div class="pbar-bg"><div class="pbar-fill" style="width:${fw}%;background:${ac(p)}"></div></div>
        <div class="pbar-labels"><span class="pl-ach" style="color:${ac(p)}">${fP(p)}</span><span class="pl-tgt">목표 ${fN(d.tgt)}</span></div></div>
      <div class="divider"></div>
      <div class="cc-nums">
        <div class="num-row"><span class="nr-label">실적</span><span class="nr-val" style="color:${d.act!==null?ch.hex:'var(--ink3)'}">${fN(d.act)}</span></div>
        <div class="num-row"><span class="nr-label">목표</span><span class="nr-tgt">${fN(d.tgt)}</span></div>
        <div class="num-row"><span class="nr-label">잔여</span><span class="nr-tgt">${d.act!==null?fN(Math.max(d.tgt-d.act,0)):fN(d.tgt)}</span></div>
      </div>`;
    g.appendChild(card);
    if(ringC[ch.key])ringC[ch.key].destroy();
    requestAnimationFrame(()=>{
      const v=p!==null?Math.min(p,100):0;
      ringC[ch.key]=new Chart(document.getElementById(`ring_${ch.key}`),{
        type:'doughnut',data:{datasets:[{data:[v,Math.max(0,100-v)],backgroundColor:[ac(p),'#DDE8F4'],borderWidth:0,circumference:270,rotation:225}]},
        options:{responsive:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:900,easing:'easeInOutQuart'}}
      });
    });
  });
}

let drillCharts=[];

function openDrill(chKey){
  curDrillCh=chKey;curPartner=null;
  const ch=CHS.find(c=>c.key===chKey);
  const d=getPd(chKey),p=pct(d.act,d.tgt);
  const pl=curMo==='ytd'?`YTD 1~${AM}월`:`${MO[curMo]}`;

  // 헤더
  document.getElementById('dhDot').style.background=ch.hex;
  document.getElementById('dhTitle').textContent=ch.label;
  document.getElementById('dhSub').textContent=`${ch.sub} · ${pl}`;
  const badge=document.getElementById('dhBadge');
  badge.textContent=fP(p); badge.style.color=ac(p); badge.style.background=ab(p);

  // 채널 전환 탭
  document.getElementById('drillChTabs').innerHTML=CHS.map(c=>`
    <button class="dct${c.key===chKey?' on':''}" style="${c.key===chKey?`background:${c.hex}22;border-color:${c.hex};color:${c.hex}`:''}"
      onclick="openDrill('${c.key}')">
      <span class="cdot" style="background:${c.hex}"></span>${c.label}
    </button>`).join('');

  // 왼쪽 KPI
  const gap=d.act!==null?Math.max(d.tgt-d.act,0):null;
  const prevMoIdx=curMo==='ytd'?null:(curMo>0?curMo-1:null);
  const prevAct=prevMoIdx!==null?ACT[chKey][prevMoIdx]:null;
  const mom=prevAct!==null&&d.act!==null?((d.act-prevAct)/prevAct*100):null;
  document.getElementById('dlKpis').innerHTML=`
    <div class="dlk"><div class="dlk-label">${pl} 실적</div>
      <div class="dlk-val" style="color:${ch.hex}">${fN(d.act)}</div><div class="dlk-sub">목표 ${fN(d.tgt)}</div></div>
    <div class="dlk"><div class="dlk-label">달성률</div>
      <div class="dlk-val" style="color:${ac(p)}">${fP(p)}</div><div class="dlk-sub">목표 대비</div></div>
    <div class="dlk"><div class="dlk-label">잔여 목표</div>
      <div class="dlk-val" style="color:${gap===0?'var(--pos)':'var(--ink2)'}">${gap!==null?fN(gap):'—'}</div>
      <div class="dlk-sub">달성까지</div></div>`;

  // 섹션 바 색상
  document.getElementById('dsecBar').style.background=ch.hex;

  // 거래처 테이블
  const subs=SUBS[chKey]||[];
  const totAct=d.act||0;
  let tT=0,tA=0,tH=false;
  const tbody=document.getElementById('subTbody'); tbody.innerHTML='';
  subs.forEach(s=>{
    const sd=getSubPd(s),sp=pct(sd.act,sd.tgt);
    const share=totAct>0&&sd.act!==null?(sd.act/totAct*100).toFixed(1)+'%':'—';
    if(sd.tgt)tT+=sd.tgt; if(sd.act!==null){tA+=sd.act;tH=true;}
    const bw=sp!==null?Math.min(sp,100).toFixed(1):0;
    const tr=document.createElement('tr');
    const pdKey=`${chKey}_${s.name}`;
    const hasPD=!!PARTNER_DETAIL[pdKey];
    tr.style.cursor=hasPD?'pointer':'default';
    tr.title=hasPD?`${s.name} 상세 보기`:'';
    tr.onclick=hasPD?()=>openPartnerDetail(pdKey):null;
    tr.innerHTML=`<td style="display:flex;align-items:center;justify-content:space-between">
        <span>${s.name}</span>
        ${hasPD?`<span style="font-size:9px;color:var(--ink3);opacity:0;transition:.15s" class="tr-hint">상세 →</span>`:''}
      </td>
      <td class="v-tgt">${fN(sd.tgt)}</td>
      <td class="v-act" style="color:${sd.act!==null?ch.hex:'var(--ink3)'}">${fN(sd.act)}</td>
      <td><div class="mbar"><div class="mb-bg"><div class="mb-f" style="width:${bw}%;background:${ac(sp)}"></div></div>
        <span style="color:${ac(sp)};min-width:36px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:700">${fP(sp)}</span></div></td>
      <td style="font-size:10.5px;color:var(--ink3)">${share}</td>`;

  curPartner=null;

    ]},options:{responsive:true,maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{...TP,callbacks:{label:c=>` ${c.dataset.label}: ${c.raw!==null?c.raw+'억':'—'}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:8.5},color:'#4A6A88',maxRotation:0},border:{color:'#DDE8F4'}},y:{grid:GR,ticks:{callback:v=>v+'억',font:{size:8},color:'#4A6A88'},border:{display:false}}}}
    });
  });
}
function renderAll(){renderBanner();renderCards();renderCharts();}
renderMoBar();renderAll();
